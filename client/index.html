<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mistral Raid</title>
  <style>
    @font-face {
      font-family: 'Press Start 2P';
      src: url('/fonts/PressStart2P-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: 'Pixel Operator 8';
      src: url('/fonts/PixelOperator8.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: 'Pixel Operator 8 Bold';
      src: url('/fonts/PixelOperator8-Bold.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a1a;
      box-sizing: border-box;
      overflow: hidden;
    }

    #app {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
